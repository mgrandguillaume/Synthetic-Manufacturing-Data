# Simple Assembly Factory — input parameters
#
# Generates a small synthetic factory where every workstation is an assembly
# station. Raw materials come from :Inv, finished products go to :QI.
#
# BOM tree:  raw materials (level 0) → intermediates (1..depth-1) → products (level=depth)
# Every component with level > 0 (intermediate OR product) gets at least one
# producing configuration on some assembly workstation.

metadata:
  name: "simple_assembly_factory"
  seed: 42                      # null for non-reproducible

# Bill of materials —————————————————————————————————————————————————
bom:
  n_products: 2
  depth: 2                      # 2 ⇒ raw → intermediate → product
  branching: [2, 3]             # children per parent (uniform random in range)
  quantity: [1, 3]              # qty on each BOM edge
  sharing_ratio: 0.3            # P(reuse existing component at same level)

# Workstations —————————————————————————————————————————————————————
# All workstations are assembly. :Inv (source) and :QI (sink) added automatically.
workstations:
  count: 4

# Configurations (workstation × component capability) ————————————————
configurations:
  producers_per_component: [1, 2]   # clamped to ≤ workstations.count
  processing_time: [0.1, 0.5]       # hours per unit
  setup_time:      [0.5, 2.0]       # hours per setup
  setup_cost:      [50, 300]        # cost per setup
  operating_cost:  [2, 15]          # cost per unit produced

# Layout ——————————————————————————————————————————————————————————————
# topology:
#   parallel — Inv → every assembly WS → QI (independent stations)
#   linear   — Inv → WS_1 → WS_2 → … → WS_n → QI (single line)
layout:
  topology: "parallel"
  flow_capacity:  [50, 200]
  transport_cost: [0.5, 5.0]

# Simulation ——————————————————————————————————————————————————————————
simulation:
  n_orders:           10    # number of production orders to release
  tick_duration:      0.05  # simulated hours per tick (~3 min)
  buffer_capacity:    20    # max units per non-raw component buffer
  order_interarrival: 10    # ticks between successive order releases
  n_ticks:            3000  # hard upper bound on simulation length

# Sweep ———————————————————————————————————————————————————————————————
# Parameter grid for sweep/sweep.py. Every combination of the expanded
# values is tested. Three formats are supported per parameter:
#
#   fixed   scalar          n_products: 2
#   list    explicit        depth: [1, 2, 3]
#   range   min/max/step    sharing_ratio: {min: 0.0, max: 1.0, step: 0.5}
#
# topology sweeps the two layout types:
#   parallel — all workstations fed directly from Inv (independent)
#   linear   — workstations chained Inv → WS_1 → … → WS_n → QI
#
sweep:
  n_products:    {min: 1, max: 7, step: 1}
  depth:         {min: 1, max: 7, step: 1}
  sharing_ratio: [0.0, 0.5, 1.0]
  topology:      ["parallel"] # "parallel", "linear"

# Output ——————————————————————————————————————————————————————————————
# Relative path → resolved next to this script.
# Absolute path → used as-is (e.g. "C:/data/factory" or "/tmp/factory").
output:
  directory: "gen_output"
